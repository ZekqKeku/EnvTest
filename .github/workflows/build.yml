name: Build Apps with PyInstaller

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    environment: env
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Create .env file from GitHub Secrets
      # This step creates a .env file based on the secrets stored in the GitHub repository settings
      run: |
        echo "API_KEY=${{ secrets.API_KEY }}" > .env
      shell: bash

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      # The --collect-all customtkinter flag is required to properly include the library's assets
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data ".env;." --name "EnvTestApp" --collect-all customtkinter main.py
        
    - name: Build with PyInstaller (macOS)
      if: matrix.os == 'macos-latest'
      # On macOS, --windowed generates an .app bundle in the dist/ folder
      run: |
        pyinstaller --noconfirm --windowed --add-data ".env:." --name "EnvTestApp" --collect-all customtkinter main.py
        
    - name: Upload Artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: EnvTestApp-Windows
        path: dist/EnvTestApp.exe

    - name: Upload Artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: EnvTestApp-macOS
        path: dist/EnvTestApp.app
